<title>Panel anfitrión - TuAloja</title>

<style>
body{margin:0;font-family:Arial;background:#f7f8fc}

.header{
  background:#fff;
  padding:16px;
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  border-bottom:1px solid #eee;
}

.logo{font-weight:bold;font-size:22px;color:#2f2b8f;text-decoration:none}

.header-actions{display:flex;gap:10px;flex-wrap:wrap}

.top-btn{
  padding:10px 14px;
  border-radius:10px;
  border:1px solid #ccc;
  text-decoration:none;
  background:#fff;
  cursor:pointer;
}

.page{max-width:1000px;margin:auto;padding:20px}

.card{background:#fff;padding:20px;border-radius:20px}

.tabs{display:flex;gap:10px;margin-bottom:20px}

.tab-btn{
  padding:10px 16px;
  border-radius:10px;
  border:none;
  cursor:pointer;
}

.tab-btn.active{background:#4f3dbb;color:#fff}

/* 🔥 STATS */
.stats{
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
  margin-bottom:20px;
}
