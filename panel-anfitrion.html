<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel anfitrión - TuAloja</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      margin: 0;
      padding: 30px;
    }

    .panel {
      max-width: 1100px;
      margin: 0 auto;
      background: #fff;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
    }

    .acciones {
      display: flex;
      gap: 12px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-primary {
      background: #2d2aa7;
      color: white;
    }

    .btn-light {
      background: #ececec;
      color: #222;
    }

    .card-alojamiento {
      border: 1px solid #ddd;
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 18px;
      background: white;
    }

    .card-alojamiento img {
      width: 100%;
      max-height: 240px;
      object-fit: cover;
      display: block;
    }

    .card-info {
      padding: 16px;
    }

    .card-info h3 {
      margin: 0 0 8px 0;
    }

    .vacio {
      padding: 20px;
      background: #fafafa;
      border: 1px dashed #ccc;
      border-radius: 14px;
    }
  </style>
</head>
<body>

  <div class="panel">
    <h1>Panel anfitrión</h1>
    <p>Administrá tus alojamientos.</p>

    <div class="acciones">
      <button class="btn btn-primary" onclick="window.location.href='publicar.html'">
        + Publicar alojamiento
      </button>

      <button class="btn btn-light" data-cerrar-sesion>
        Cerrar sesión
      </button>
    </div>

    <h2>Mis alojamientos</h2>

    <div data-mis-alojamientos></div>
  </div>

  <script type="module" src="./panel-anfitrion.js"></script>
</body>
</html>
