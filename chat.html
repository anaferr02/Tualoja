<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat - TuAloja</title>

  <style>
    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:#f5f6fb;
      color:#1f2450;
    }

    .header{
      position:sticky;
      top:0;
      z-index:50;
      background:#fff;
      border-bottom:1px solid #e6e8f2;
      padding:16px 24px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
    }

    .logo{
      text-decoration:none;
      font-size:28px;
      font-weight:800;
      color:#272d7d;
      font-family:Georgia, "Times New Roman", serif;
    }

    .header-actions{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin-left:auto;
    }

    .top-btn{
      text-decoration:none;
      border:1px solid #d8dcef;
      background:#fff;
      color:#272d7d;
      padding:10px 16px;
      border-radius:14px;
      font-weight:700;
      font-size:14px;
      cursor:pointer;
      transition:.2s ease;
    }

    .top-btn:hover{
      background:#f7f8ff;
    }

    .hamburger{
      display:none;
      font-size:20px;
      background:none;
      border:none;
      cursor:pointer;
    }

    .page{
      max-width:1100px;
      margin:0 auto;
      padding:24px 16px 50px;
    }

    .chat-wrap{
      background:#fff;
      border:1px solid #dde3f2;
      border-radius:24px;
      box-shadow:0 10px 26px rgba(0,0,0,.05);
      overflow:hidden;
    }

    .chat-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
      padding:18px;
      border-bottom:1px solid #eceff6;
      background:#fcfcff;
      flex-wrap:wrap;
    }

    .chat-title h1{
      margin:0 0 6px;
      font-size:28px;
      color:#272d7d;
      font-family:Georgia, "Times New Roman", serif;
    }

    .chat-title p{
      margin:0;
      color:#687193;
      font-size:14px;
    }

    .chat-status{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      border-radius:999px;
      background:#eef3ff;
      color:#2f4f9f;
      font-weight:700;
      font-size:14px;
    }

    .dot{
      width:10px;
      height:10px;
      border-radius:999px;
      background:#31a24c;
      display:inline-block;
    }

    .chat-body{
      height:460px;
      overflow:auto;
      padding:18px;
      background:linear-gradient(180deg,#f9fbff 0%, #f3f6ff 100%);
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .empty-chat{
      margin:auto;
      text-align:center;
      color:#6b7394;
      background:#fff;
      border:1px dashed #d6dced;
      border-radius:18px;
      padding:30px 20px;
      max-width:420px;
      width:100%;
    }

    .msg-row{
      display:flex;
    }

    .msg-row.me{
      justify-content:flex-end;
    }

    .msg-row.other{
      justify-content:flex-start;
    }

    .msg-bubble{
      max-width:min(78%, 620px);
      border-radius:18px;
      padding:12px 14px;
      box-shadow:0 6px 18px rgba(0,0,0,.05);
      line-height:1.45;
      word-break:break-word;
    }

    .msg-row.me .msg-bubble{
      background:#31368d;
      color:#fff;
      border-bottom-right-radius:8px;
    }

    .msg-row.other .msg-bubble{
      background:#fff;
      color:#26304d;
      border:1px solid #e1e6f3;
      border-bottom-left-radius:8px;
    }

    .msg-meta{
      margin-top:8px;
      font-size:12px;
      opacity:.8;
    }

    .chat-compose{
      border-top:1px solid #eceff6;
      padding:16px;
      background:#fff;
    }

    .compose-box{
      display:grid;
      grid-template-columns:1fr auto;
      gap:12px;
      align-items:end;
    }

    .compose-box textarea{
      width:100%;
      min-height:58px;
      max-height:160px;
      resize:vertical;
      padding:14px;
      border-radius:16px;
      border:1px solid #d7deef;
      font-family:inherit;
      font-size:15px;
      outline:none;
    }

    .compose-box textarea:focus{
      border-color:#5864d9;
      box-shadow:0 0 0 4px rgba(88,100,217,.10);
    }

    .send-btn{
      height:54px;
      padding:0 20px;
      border:none;
      border-radius:16px;
      background:linear-gradient(180deg,#4b54d4,#31368d);
      color:#fff;
      font-weight:800;
      font-size:15px;
      cursor:pointer;
    }

    .send-btn:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    .chat-note{
      margin-top:10px;
      color:#6b7394;
      font-size:13px;
    }

    .error-box{
      margin-top:14px;
      padding:14px;
      border-radius:16px;
      background:#fff3f3;
      color:#8c2e2e;
      border:1px solid #f0d0d0;
      font-weight:700;
    }

    @media (max-width: 800px){
      .hamburger{ display:block; }

      .header-actions{
        display:none;
        position:absolute;
        right:16px;
        top:72px;
        background:white;
        padding:14px;
        border-radius:14px;
        box-shadow:0 10px 30px rgba(0,0,0,.15);
        flex-direction:column;
        align-items:stretch;
        min-width:220px;
      }

      .header-actions.nav-open{ display:flex; }

      .top-btn{ text-align:center; }

      .compose-box{
        grid-template-columns:1fr;
      }

      .send-btn{
        width:100%;
      }

      .chat-body{
        height:420px;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <a class="logo" href="index.html">TuAloja.com</a>

    <div id="headerActions" class="header-actions">
      <a class="top-btn" href="mis-reservas.html">Mis reservas</a>
      <a class="top-btn" href="panel-anfitrion.html">Panel anfitrión</a>
      <a class="top-btn" href="mi-cuenta.html">Mi cuenta</a>
      <button class="top-btn" id="logoutBtn" type="button">Cerrar sesión</button>
    </div>

    <button id="hamburgerBtn" class="hamburger" type="button">☰</button>
  </header>

  <main class="page">
    <div class="chat-wrap">
      <div class="chat-top">
        <div class="chat-title">
          <h1 id="chatTitle">Chat de reserva</h1>
          <p id="chatSubtitle">Cargando conversación…</p>
        </div>

        <div class="chat-status">
          <span class="dot"></span>
          <span id="chatStatusText">Reserva aceptada</span>
        </div>
      </div>

      <div id="chatBody" class="chat-body">
        <div class="empty-chat">Cargando mensajes…</div>
      </div>

      <div class="chat-compose">
        <form id="chatForm">
          <div class="compose-box">
            <textarea id="chatInput" placeholder="Escribí un mensaje…" required></textarea>
            <button id="sendBtn" class="send-btn" type="submit">Enviar</button>
          </div>
        </form>
        <div class="chat-note">
          El chat queda habilitado cuando la reserva está aceptada. Una vez iniciado, ya no se puede cancelar online.
        </div>
        <div id="chatError" class="error-box" style="display:none;"></div>
      </div>
    </div>
  </main>

  <script type="module">
    import { db, auth } from "./firebase-config.js";
    import {
      collection,
      addDoc,
      doc,
      getDoc,
      onSnapshot,
      orderBy,
      query,
      serverTimestamp,
      updateDoc
    } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    import {
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

    const hamburgerBtn = document.getElementById("hamburgerBtn");
    const headerActions = document.getElementById("headerActions");
    const logoutBtn = document.getElementById("logoutBtn");

    const chatTitle = document.getElementById("chatTitle");
    const chatSubtitle = document.getElementById("chatSubtitle");
    const chatStatusText = document.getElementById("chatStatusText");
    const chatBody = document.getElementById("chatBody");
    const chatForm = document.getElementById("chatForm");
    const chatInput = document.getElementById("chatInput");
    const sendBtn = document.getElementById("sendBtn");
    const chatError = document.getElementById("chatError");

    const params = new URLSearchParams(window.location.search);
    const reservaId = params.get("reserva") || "";

    let currentUser = null;
    let currentReserva = null;
    let unsubscribeMsgs = null;

    hamburgerBtn?.addEventListener("click", () => {
      headerActions?.classList.toggle("nav-open");
    });

    document.addEventListener("click", (e) => {
      if (!headerActions?.contains(e.target) && !hamburgerBtn?.contains(e.target)) {
        headerActions?.classList.remove("nav-open");
      }
    });

    logoutBtn?.addEventListener("click", async () => {
      await signOut(auth);
      localStorage.removeItem("tualoja_user");
      localStorage.removeItem("tualoja_logged");
      location.href = "index.html";
    });

    function escapeHtml(texto = "") {
      return String(texto)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function formatDateTime(value) {
      if (!value) return "";
      try {
        const date = value?.toDate ? value.toDate() : new Date(value);
        return date.toLocaleString("es-AR", {
          day: "2-digit",
          month: "2-digit",
          year: "numeric",
          hour: "2-digit",
          minute: "2-digit"
        });
      } catch {
        return "";
      }
    }

    function userIsHost(reserva, user) {
      const hostIds = [
        reserva?.anfitrionId,
        reserva?.hostId,
        reserva?.ownerId
      ].map(x => String(x || "").trim()).filter(Boolean);

      const hostEmails = [
        reserva?.anfitrionEmail,
        reserva?.hostEmail,
        reserva?.ownerEmail
      ].map(x => String(x || "").toLowerCase().trim()).filter(Boolean);

      const uid = String(user?.uid || "").trim();
      const email = String(user?.email || "").toLowerCase().trim();

      return hostIds.includes(uid) || hostEmails.includes(email);
    }

    function canUseChat(reserva) {
      const estado = String(reserva?.status || "").toLowerCase();
      return estado === "aceptada" || estado === "confirmada" || reserva?.chatHabilitado === true;
    }

    function renderMessages(messages = []) {
      if (!messages.length) {
        chatBody.innerHTML = `
          <div class="empty-chat">
            Todavía no hay mensajes.<br>
            Podés iniciar la conversación desde acá.
          </div>
        `;
        return;
      }

      chatBody.innerHTML = messages.map((m) => {
        const mine = String(m.remitenteId || "") === String(currentUser?.uid || "");
        const rol = mine ? "me" : "other";
        return `
          <div class="msg-row ${rol}">
            <div class="msg-bubble">
              <div>${escapeHtml(m.texto || "")}</div>
              <div class="msg-meta">${escapeHtml(m.remitenteNombre || "Usuario")} · ${formatDateTime(m.creadoEn)}</div>
            </div>
          </div>
        `;
      }).join("");

      chatBody.scrollTop = chatBody.scrollHeight;
    }

    function setError(msg = "") {
      if (!msg) {
        chatError.style.display = "none";
        chatError.textContent = "";
        return;
      }
      chatError.style.display = "block";
      chatError.textContent = msg;
    }

    async function marcarLeidoSegunRol(reserva, isHost) {
      const updates = isHost
        ? { noLeidoAnfitrion: false }
        : { noLeidoHuesped: false };

      try {
        await updateDoc(doc(db, "reservas", reservaId), updates);
      } catch (e) {
        console.warn("No se pudo marcar leído:", e);
      }
    }

    async function cargarReservaYMensajes(user) {
      if (!reservaId) {
        setError("Falta el id de la reserva.");
        chatBody.innerHTML = `<div class="empty-chat">No se encontró la reserva.</div>`;
        sendBtn.disabled = true;
        chatInput.disabled = true;
        return;
      }

      const snap = await getDoc(doc(db, "reservas", reservaId));

      if (!snap.exists()) {
        setError("La reserva no existe.");
        chatBody.innerHTML = `<div class="empty-chat">La reserva no existe.</div>`;
        sendBtn.disabled = true;
        chatInput.disabled = true;
        return;
      }

      currentReserva = { id: snap.id, ...snap.data() };

      const isHost = userIsHost(currentReserva, user);
      const userUid = String(user?.uid || "").trim();
      const userEmail = String(user?.email || "").toLowerCase().trim();
      const guestUid = String(currentReserva?.huespedId || "").trim();
      const guestEmail = String(currentReserva?.huespedEmail || currentReserva?.guestEmail || "").toLowerCase().trim();

      const permitido = isHost || userUid === guestUid || userEmail === guestEmail;

      if (!permitido) {
        setError("No tenés permiso para ver este chat.");
        chatBody.innerHTML = `<div class="empty-chat">No tenés permiso para ver esta conversación.</div>`;
        sendBtn.disabled = true;
        chatInput.disabled = true;
        return;
      }

      chatTitle.textContent = currentReserva?.titulo || currentReserva?.alojamientoTitulo || "Chat de reserva";
      chatSubtitle.textContent = `${currentReserva?.checkin || "-"} → ${currentReserva?.checkout || "-"} · ${currentReserva?.guests || 1} huésped(es)`;

      if (!canUseChat(currentReserva)) {
        chatStatusText.textContent = "Chat no habilitado";
        setError("El chat se habilita cuando la reserva está aceptada.");
        sendBtn.disabled = true;
        chatInput.disabled = true;
      } else {
        chatStatusText.textContent = "Reserva aceptada";
        setError("");
      }

      await marcarLeidoSegunRol(currentReserva, isHost);

      const msgsRef = collection(db, "reservas", reservaId, "mensajes");
      const q = query(msgsRef, orderBy("creadoEn", "asc"));

      if (unsubscribeMsgs) unsubscribeMsgs();

      unsubscribeMsgs = onSnapshot(q, async (snapMsgs) => {
        const data = snapMsgs.docs.map(d => ({ id: d.id, ...d.data() }));
        renderMessages(data);

        try {
          await marcarLeidoSegunRol(currentReserva, isHost);
        } catch {}
      });
    }

    chatForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      if (!currentUser || !currentReserva) return;
      if (!canUseChat(currentReserva)) {
        setError("El chat no está habilitado para esta reserva.");
        return;
      }

      const texto = chatInput.value.trim();
      if (!texto) return;

      sendBtn.disabled = true;
      setError("");

      try {
        const isHost = userIsHost(currentReserva, currentUser);
        const nombre =
          currentUser.displayName ||
          (isHost ? "Anfitrión" : currentReserva?.huespedNombre || "Huésped");

       await addDoc(collection(db, "reservas", reservaId, "mensajes"), {
  texto,
  remitenteId: currentUser.uid,
  remitenteEmail: currentUser.email || "",
  remitenteNombre: nombre,
  remitenteRol: isHost ? "host" : "guest",
  creadoEn: serverTimestamp()
});
        // 🔔 crear notificación
await addDoc(collection(db, "notificaciones"), {
  userId: isHost ? currentReserva.huespedId : currentReserva.anfitrionId,
  texto: "Tenés un nuevo mensaje",
  tipo: "mensaje",
  reservaId: reservaId,
  leida: false,
  createdAt: serverTimestamp()
});

        await updateDoc(doc(db, "reservas", reservaId), {
          chatIniciado: true,
          chatHabilitado: true,
          ultimoMensaje: texto,
          ultimoMensajeEn: serverTimestamp(),
          noLeidoAnfitrion: !isHost,
          noLeidoHuesped: isHost
        });

        chatInput.value = "";
      } catch (error) {
        console.error(error);
        setError("No se pudo enviar el mensaje.");
      } finally {
        sendBtn.disabled = false;
      }
    });

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        alert("Iniciá sesión para entrar al chat.");
        location.href = "login.html";
        return;
      }

      currentUser = user;
      await cargarReservaYMensajes(user);
    });
  </script>
</body>
</html>
