<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tualoja - Alquila fácil, viaja feliz</title>

  <style>
    * { box-sizing: border-box; }
    body { font-family: Arial; }
  </style>
</head>

<body>

  <main>
    <h2>Buscá tu alojamiento</h2>

    <input type="text" id="destino" placeholder="Destino">

    <input type="date" id="entrada">
    <input type="date" id="salida">

    <input type="number" id="adultos" value="1">
    <input type="number" id="ninos" value="0">
    <input type="number" id="habitaciones" value="1">

    <button onclick="buscar()">Buscar</button>
  </main>

<script>
function hoyLocal() {
  const hoy = new Date();
  const anio = hoy.getFullYear();
  const mes = String(hoy.getMonth() + 1).padStart(2, "0");
  const dia = String(hoy.getDate()).padStart(2, "0");
  return `${anio}-${mes}-${dia}`;
}

function buscar(){
  const destino = document.getElementById("destino").value;
  const entradaInput = document.getElementById("entrada");
  const salidaInput = document.getElementById("salida");

  const checkin = entradaInput.value;
  const checkout = salidaInput.value;
  const hoy = hoyLocal();

  // 🔒 BLOQUEO DE FECHAS PASADAS
  if (checkin && checkin < hoy) {
    alert("No podés elegir una fecha pasada.");
    return;
  }

  if (checkout && checkout < hoy) {
    alert("No podés elegir una fecha pasada.");
    return;
  }

  // 🔒 VALIDACIÓN ENTRE FECHAS
  if (checkin && checkout && checkout <= checkin) {
    alert("La salida debe ser después de la entrada.");
    return;
  }

  const adultos = Number(document.getElementById("adultos").value);
  const ninos = Number(document.getElementById("ninos").value);
  const habitaciones = Number(document.getElementById("habitaciones").value);
  const guests = adultos + ninos;

  const params = new URLSearchParams();

  params.set("destino", destino);
  params.set("checkin", checkin);
  params.set("checkout", checkout);
  params.set("guests", guests);

  window.location.href = `resultados.html?${params.toString()}`;
}

// 🔒 BLOQUEO AUTOMÁTICO EN INPUTS
document.addEventListener("DOMContentLoaded", () => {
  const entrada = document.getElementById("entrada");
  const salida = document.getElementById("salida");

  const hoy = hoyLocal();

  entrada.min = hoy;
  salida.min = hoy;

  entrada.addEventListener("change", () => {
    salida.min = entrada.value;

    if (salida.value && salida.value <= entrada.value) {
      salida.value = "";
    }
  });
});
</script>

</body>
</html>
