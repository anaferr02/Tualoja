<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mi cuenta - TuAloja</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<header class="header">
  <a class="logo" href="index.html">TuAloja.com</a>

  <nav class="nav">
    <a href="publicar.html">Publicar alojamiento</a>
    <a href="mis-reservas.html">Mis reservas</a>
    <a href="panel-anfitrion.html">Panel anfitrión</a>
    <a href="mi-cuenta.html">Mi cuenta</a>

    <!-- 🔔 CAMPANITA -->
    <div class="notif-wrap" id="notifBtn">
      🔔
      <span class="notif-count" id="notifCount" style="display:none">0</span>

      <div class="notif-dropdown" id="notifDropdown">
        <div class="notif-head">
          <strong>Notificaciones</strong>
          <button id="markReadBtn">Marcar leídas</button>
        </div>

        <div id="notifList" class="notif-list"></div>
      </div>
    </div>

    <a href="#" id="logoutLink">Cerrar sesión</a>
  </nav>
</header>

<main class="page-wrap">
  <div class="card">
    <h1>Mi cuenta</h1>

    <label>Email</label>
    <input id="email" disabled/>
  </div>
</main>

<script type="module">
import { logout } from "./public/js/auth.js";
import { auth, db } from "./firebase-config.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import {
  collection,
  query,
  where,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const emailEl = document.getElementById("email");
const notifBtn = document.getElementById("notifBtn");
const notifDropdown = document.getElementById("notifDropdown");
const notifCount = document.getElementById("notifCount");
const notifList = document.getElementById("notifList");
const logoutLink = document.getElementById("logoutLink");

// 🔥 CARGAR NOTIFICACIONES DESDE FIREBASE
async function loadNotifications(uid){
  const q = query(
    collection(db, "notificaciones"),
    where("userId", "==", uid)
  );

  const snap = await getDocs(q);

  const list = [];
  snap.forEach(doc => list.push({ id: doc.id, ...doc.data() }));

  // ordenar manual
  list.sort((a,b)=>{
    const ta = a.fecha?.seconds || 0;
    const tb = b.fecha?.seconds || 0;
    return tb - ta;
  });

  return list;
}

// 🔔 RENDER
async function renderNotifications(uid){
  const list = await loadNotifications(uid);

  const unread = list.filter(n=>!n.leida).length;

  notifCount.textContent = unread;
  notifCount.style.display = unread > 0 ? "flex" : "none";

  if(!list.length){
    notifList.innerHTML = `<div class="notif-empty">No tenés notificaciones</div>`;
    return;
  }

  notifList.innerHTML = list.map(n=>{
    const url = n.tipo === "reserva"
      ? "mis-reservas.html"
      : "chat.html?reserva=" + (n.reservaId || "");

    return `
      <a href="${url}" class="notif-item">
        <strong>${n.tipo === "reserva" ? "Nueva reserva" : "Nuevo mensaje"}</strong>
        <p>${n.mensaje}</p>
        <small>${n.leida ? "Leída" : "Nueva"}</small>
      </a>
    `;
  }).join("");
}

// 🔥 ESPERAR FIREBASE
onAuthStateChanged(auth, async (user)=>{
  console.log("USER:", user);

  if(!user){
    notifList.innerHTML = `<div class="notif-empty">No hay sesión</div>`;
    return;
  }

  emailEl.value = user.email;
  await renderNotifications(user.uid);
});

// 🔔 UI
notifBtn.addEventListener("click",(e)=>{
  e.stopPropagation();
  notifDropdown.classList.toggle("open");
});

document.addEventListener("click",(e)=>{
  if(!notifBtn.contains(e.target)){
    notifDropdown.classList.remove("open");
  }
});

// logout
logoutLink.addEventListener("click",(e)=>{
  e.preventDefault();
  logout();
});
</script>

</body>
</html>
