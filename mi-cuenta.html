<script type="module">
  import { logout, getUser } from "./public/js/auth.js";
  import { auth, db } from "./firebase-config.js";
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
  import {
    collection,
    query,
    where,
    getDocs
  } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  const usersKey = "tualoja_users";
  const userObj = getUser();
  const myEmail = (userObj?.email || "").toLowerCase();

  const emailEl = document.getElementById("email");
  const nameEl = document.getElementById("name");
  const msg = document.getElementById("msg");
  const err = document.getElementById("err");
  const ok = document.getElementById("ok");
  const welcomeTitle = document.getElementById("welcomeTitle");
  const avatar = document.getElementById("avatar");
  const btnEdit = document.getElementById("btnEdit");
  const btnTogglePass = document.getElementById("btnTogglePass");
  const passwordFields = document.getElementById("passwordFields");
  const profilePhotoInput = document.getElementById("profilePhoto");

  const notifBtn = document.getElementById("notifBtn");
  const notifDropdown = document.getElementById("notifDropdown");
  const notifCount = document.getElementById("notifCount");
  const notifList = document.getElementById("notifList");
  const markReadBtn = document.getElementById("markReadBtn");
  const logoutLink = document.getElementById("logoutLink");

  let editMode = false;
  let passOpen = false;
  let firebaseUid = "";

  function loadUsers() {
    try {
      return JSON.parse(localStorage.getItem(usersKey) || "[]");
    } catch {
      return [];
    }
  }

  function saveUsers(u) {
    localStorage.setItem(usersKey, JSON.stringify(u));
  }

  async function loadNotifications(uid) {
    if (!uid) return [];

    try {
      const q = query(
        collection(db, "notificaciones"),
        where("userId", "==", uid)
      );

      const snap = await getDocs(q);
      const list = [];

      snap.forEach((d) => {
        list.push({ id: d.id, ...d.data() });
      });

      list.sort((a, b) => {
        const ta = a.fecha?.seconds || 0;
        const tb = b.fecha?.seconds || 0;
        return tb - ta;
      });

      return list;
    } catch (error) {
      console.error("Error cargando notificaciones:", error);
      return [];
    }
  }

  async function renderNotifications(uid) {
    if (!notifList || !notifCount) return;

    const list = await loadNotifications(uid);
    const unread = list.filter(n => !n.leida).length;

    notifCount.textContent = unread;
    notifCount.style.display = unread > 0 ? "flex" : "none";

    if (!list.length) {
      notifList.innerHTML = `<div class="notif-empty">No tenés notificaciones por ahora.</div>`;
      return;
    }

    notifList.innerHTML = list.map((n) => {
      const url = n.tipo === "reserva"
        ? "mis-reservas.html"
        : "chat.html?reserva=" + (n.reservaId || "");

      return `
        <a href="${url}" class="notif-item">
          <strong>${n.tipo === "reserva" ? "Nueva reserva" : "Nuevo mensaje"}</strong>
          <p>${n.mensaje || ""}</p>
          <small>${n.leida ? "Leída" : "Nueva"}</small>
        </a>
      `;
    }).join("");
  }

  function setEditMode(state) {
    editMode = state;

    if (nameEl) nameEl.disabled = !state;
    if (btnEdit) btnEdit.textContent = state ? "Cancelar" : "Modificar";

    if (!state && nameEl) {
      const users = loadUsers();
      const user = users.find(u => (u.email || "").toLowerCase() === myEmail);
      nameEl.value = user?.name || userObj?.name || "";
    }
  }

  function setPassMode(state) {
    passOpen = state;

    if (passwordFields) {
      passwordFields.classList.toggle("open", state);
    }

    if (btnTogglePass) {
      btnTogglePass.textContent = state ? "Cancelar cambio" : "Modificar contraseña";
    }

    if (!state) {
      const pass1 = document.getElementById("pass1");
      const pass2 = document.getElementById("pass2");

      if (pass1) pass1.value = "";
      if (pass2) pass2.value = "";
      if (err) err.style.display = "none";
      if (ok) ok.style.display = "none";
    }
  }

  function updateGreeting(name) {
    const cleanName = (name || "").trim();
    const first = cleanName ? cleanName.split(" ")[0] : "Usuario";

    if (welcomeTitle) {
      welcomeTitle.textContent = `Hola, ${first} 👋`;
    }

    if (avatar && !avatar.querySelector("img")) {
      avatar.textContent = first.charAt(0).toUpperCase();
    }
  }

  function getPhotoKey() {
    return "tualoja_profile_photo_" + myEmail;
  }

  function renderPhoto() {
    if (!avatar) return;

    const saved = localStorage.getItem(getPhotoKey());

    if (saved) {
      avatar.innerHTML = `<img src="${saved}" alt="Foto de perfil">`;
    } else {
      const currentName = nameEl?.value?.trim() || "U";
      avatar.innerHTML = currentName.charAt(0).toUpperCase();
    }
  }

  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(String(reader.result));
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  try {
    if (emailEl) emailEl.value = myEmail || "";

    const users = loadUsers();
    const user = users.find(u => (u.email || "").toLowerCase() === myEmail);
    const currentName = user?.name || userObj?.name || "";

    if (nameEl) nameEl.value = currentName;
    updateGreeting(currentName);
    renderPhoto();
    setEditMode(false);
    setPassMode(false);
  } catch (e) {
    console.error("Error en init:", e);
  }

  onAuthStateChanged(auth, async (user) => {
    try {
      if (!user) {
        if (notifList) {
          notifList.innerHTML = `<div class="notif-empty">No tenés notificaciones por ahora.</div>`;
        }
        if (notifCount) {
          notifCount.style.display = "none";
        }
        return;
      }

      firebaseUid = user.uid;

      if (emailEl) {
        emailEl.value = user.email || myEmail || "";
      }

      await renderNotifications(firebaseUid);
    } catch (e) {
      console.error("Error auth/notificaciones:", e);
    }
  });

  if (btnEdit) {
    btnEdit.addEventListener("click", () => {
      if (msg) msg.style.display = "none";

      if (!editMode) {
        setEditMode(true);
        if (nameEl) nameEl.focus();
        return;
      }

      setEditMode(false);
    });
  }

  if (btnTogglePass) {
    btnTogglePass.addEventListener("click", () => {
      setPassMode(!passOpen);
    });
  }

  const btnSave = document.getElementById("btnSave");
  if (btnSave) {
    btnSave.addEventListener("click", () => {
      if (msg) msg.style.display = "none";
      const name = nameEl?.value?.trim() || "";

      if (!name) {
        if (msg) {
          msg.textContent = "Escribí un nombre antes de guardar.";
          msg.style.display = "block";
        }
        return;
      }

      const users = loadUsers();
      const idx = users.findIndex(u => (u.email || "").toLowerCase() === myEmail);
      if (idx === -1) return;

      users[idx].name = name;
      saveUsers(users);

      const raw = localStorage.getItem("tualoja_user");
      try {
        const u = raw ? JSON.parse(raw) : null;
        if (u) {
          u.name = name;
          localStorage.setItem("tualoja_user", JSON.stringify(u));
        }
      } catch {}

      updateGreeting(name);
      renderPhoto();
      setEditMode(false);

      if (msg) {
        msg.textContent = "✅ Datos guardados.";
        msg.style.display = "block";
      }
    });
  }

  const btnPass = document.getElementById("btnPass");
  if (btnPass) {
    btnPass.addEventListener("click", () => {
      if (err) err.style.display = "none";
      if (ok) ok.style.display = "none";

      const p1 = document.getElementById("pass1")?.value || "";
      const p2 = document.getElementById("pass2")?.value || "";

      if (p1.length < 4) {
        if (err) {
          err.textContent = "La contraseña debe tener al menos 4 caracteres.";
          err.style.display = "block";
        }
        return;
      }

      if (p1 !== p2) {
        if (err) {
          err.textContent = "Las contraseñas no coinciden.";
          err.style.display = "block";
        }
        return;
      }

      const users = loadUsers();
      const idx = users.findIndex(u => (u.email || "").toLowerCase() === myEmail);
      if (idx === -1) return;

      users[idx].password = p1;
      saveUsers(users);

      if (ok) {
        ok.textContent = "✅ Contraseña actualizada.";
        ok.style.display = "block";
      }

      setPassMode(false);
    });
  }

  if (profilePhotoInput) {
    profilePhotoInput.addEventListener("change", async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;

      try {
        const b64 = await fileToBase64(file);
        localStorage.setItem(getPhotoKey(), b64);
        renderPhoto();

        if (msg) {
          msg.textContent = "✅ Foto de perfil actualizada.";
          msg.style.display = "block";
        }
      } catch {
        if (msg) {
          msg.textContent = "No se pudo subir la foto.";
          msg.style.display = "block";
        }
      }

      profilePhotoInput.value = "";
    });
  }

  if (notifBtn && notifDropdown) {
    notifBtn.addEventListener("click", async (e) => {
      e.stopPropagation();
      notifDropdown.classList.toggle("open");

      if (firebaseUid && notifDropdown.classList.contains("open")) {
        await renderNotifications(firebaseUid);
      }
    });
  }

  document.addEventListener("click", (e) => {
    if (
      notifBtn &&
      notifDropdown &&
      !notifBtn.contains(e.target) &&
      !notifDropdown.contains(e.target)
    ) {
      notifDropdown.classList.remove("open");
    }
  });

  if (markReadBtn) {
    markReadBtn.addEventListener("click", () => {
      alert("Después te hago marcar como leídas en Firebase 😉");
    });
  }

  if (logoutLink) {
    logoutLink.addEventListener("click", (e) => {
      e.preventDefault();
      logout();
    });
  }
</script>
