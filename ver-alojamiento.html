<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ver alojamiento - TuAloja</title>
<link rel="stylesheet" href="style.css">

<style>

.page{
max-width:1100px;
margin:30px auto;
padding:0 18px;
}

.card{
background:white;
border-radius:24px;
padding:22px;
box-shadow:0 18px 40px rgba(0,0,0,.08);
}

.title{
font-size:34px;
color:#1b167f;
margin-bottom:5px;
}

.city{
color:#555;
margin-bottom:18px;
}

.gallery{
display:grid;
grid-template-columns:2fr 1fr 1fr;
gap:10px;
margin-bottom:20px;
}

.gallery img{
width:100%;
height:210px;
object-fit:cover;
border-radius:14px;
}

.info{
display:grid;
grid-template-columns:2fr 1fr;
gap:24px;
}

.box{
background:#fff;
border:1px solid rgba(0,0,0,.08);
padding:18px;
border-radius:18px;
}

.price{
font-size:26px;
color:#1b167f;
font-weight:700;
margin-bottom:10px;
}

.reserve-btn{
background:#1b167f;
color:white;
padding:14px;
border:none;
border-radius:12px;
width:100%;
font-weight:700;
cursor:pointer;
margin-top:10px;
}

.services{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-top:10px;
}

.service{
background:#eef1ff;
padding:7px 12px;
border-radius:999px;
font-size:13px;
}

.host{
margin-top:15px;
font-size:14px;
color:#444;
}

@media(max-width:900px){

.gallery{
grid-template-columns:1fr;
}

.info{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<header class="header">

<a class="logo" href="index.html">TuAloja.com</a>

<nav id="mainNav" class="nav">

<a href="publicar.html">Publicar alojamiento</a>
<a href="mis-reservas.html">Mis reservas</a>
<a href="panel-anfitrion.html">Panel anfitrión</a>
<a href="mi-cuenta.html">Mi cuenta</a>
<a href="ayuda.html">Ayuda</a>

</nav>

<button id="hamburgerBtn" class="hamburger">☰</button>

</header>

<div class="page">

<div class="card">

<h1 class="title" id="titulo"></h1>

<div class="city" id="ubicacion"></div>

<div class="gallery" id="fotos"></div>

<div class="info">

<div>

<h3>Descripción</h3>
<p id="descripcion"></p>

<h3 style="margin-top:20px;">Servicios</h3>
<div class="services" id="servicios"></div>

</div>

<div class="box">

<div class="price" id="precio"></div>

<button class="reserve-btn">
Reservar
</button>

<div class="host" id="anfitrion"></div>

</div>

</div>

</div>

</div>

<footer class="footer-ayuda">
<p>© 2026 TuAloja. Todos los derechos reservados.</p>

<div class="footer-links">

<a href="politica-de-privacidad.html">Política de Privacidad</a>
<span>|</span>
<a href="terminos-y-condiciones.html">Términos y Condiciones</a>
<span>|</span>
<a href="politica-de-cancelacion.html">Política de Cancelaciones</a>
<span>|</span>
<a href="politica-anti-estafas.html">Política Anti-Estafas</a>

</div>
</footer>

<script>

const params = new URLSearchParams(location.search)

const id = params.get("id")

const arr = JSON.parse(localStorage.getItem("tualoja_listings") || "[]")

const alo = arr.find(x => x.id === id)

if(!alo){

document.body.innerHTML = "Alojamiento no encontrado"

}

document.getElementById("titulo").textContent = alo.titulo

document.getElementById("ubicacion").textContent =
alo.ciudad + ", " + alo.provincia

document.getElementById("descripcion").textContent =
alo.descripcion

document.getElementById("precio").textContent =
"$" + alo.precio + " ARS / noche"

document.getElementById("anfitrion").textContent =
"Anfitrión: " + alo.anfitrion

const gal = document.getElementById("fotos")

if(alo.fotos){

alo.fotos.forEach(f => {

const img = document.createElement("img")

img.src = f

gal.appendChild(img)

})

}

const serv = document.getElementById("servicios")

if(alo.servicios){

alo.servicios.forEach(s => {

const el = document.createElement("div")

el.className = "service"

el.textContent = s

serv.appendChild(el)

})

}

</script>

</body>
</html>
