<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mis reservas - TuAloja</title>

  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial;background:#f7f8fc;color:#1f2450}

    .header{
      background:#fff;
      border-bottom:1px solid #eee;
      padding:16px 20px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .logo{
      font-weight:bold;
      font-size:20px;
      color:#2f2b8f;
      text-decoration:none;
    }

    .page{
      max-width:1000px;
      margin:auto;
      padding:30px 20px;
    }

    h1{margin-bottom:10px}

    .filters{
      display:flex;
      gap:10px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    .filter-btn{
      padding:10px 16px;
      border-radius:12px;
      border:1px solid #ccc;
      cursor:pointer;
      background:#fff;
    }

    .filter-btn.active{
      background:#4f3dbb;
      color:#fff;
    }

    .reserva-card{
      background:#fff;
      padding:20px;
      border-radius:16px;
      margin-bottom:15px;
      display:flex;
      gap:20px;
      align-items:center;
    }

    .reserva-img{
      width:120px;
      height:90px;
      object-fit:cover;
      border-radius:10px;
    }

    .estado{
      font-weight:bold;
      margin-top:6px;
    }

    .btn{
      padding:10px 14px;
      border-radius:10px;
      border:none;
      cursor:pointer;
    }

    .btn-cancel{
      background:#ffe5e5;
      color:#a30000;
    }

    .empty{
      text-align:center;
      padding:30px;
      background:#fff;
      border-radius:12px;
    }
  </style>
</head>

<body>

<header class="header">
  <a class="logo" href="index.html">TuAloja</a>
  <button id="logoutBtn">Cerrar sesión</button>
</header>

<main class="page">

  <h1>Mis reservas</h1>

  <div class="filters">
    <button class="filter-btn active" data-filter="todas">Todas</button>
    <button class="filter-btn" data-filter="pendiente">Pendientes</button>
    <button class="filter-btn" data-filter="aceptada">Aceptadas</button>
    <button class="filter-btn" data-filter="cancelada">Canceladas</button>
  </div>

  <div id="estadoCarga">Cargando reservas...</div>

  <div id="listaReservas"></div>

</main>

<script type="module">
import { db, auth } from "./firebase-config.js";
import {
  collection,
  getDocs,
  updateDoc,
  doc,
  query,
  where
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import {
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

let reservas = [];
let filtro = "todas";

function render() {
  const cont = document.getElementById("listaReservas");

  const filtradas = reservas.filter(r => {
    if (filtro === "todas") return true;
    return (r.status || "pendiente") === filtro;
  });

  if (!filtradas.length) {
    cont.innerHTML = `<div class="empty">No hay reservas</div>`;
    return;
  }

  cont.innerHTML = filtradas.map(r => `
    <div class="reserva-card">
      <img class="reserva-img" src="${r.foto || 'https://via.placeholder.com/150'}">

      <div style="flex:1">
        <div><strong>${r.titulo || "Alojamiento"}</strong></div>
        <div>${r.checkin} → ${r.checkout}</div>
        <div>Huéspedes: ${r.guests}</div>
        <div class="estado">Estado: ${r.status}</div>
      </div>

      ${
        r.status === "pendiente" || r.status === "aceptada"
        ? `<button class="btn btn-cancel" data-id="${r.id}">Cancelar</button>`
        : ""
      }
    </div>
  `).join("");

  document.querySelectorAll("[data-id]").forEach(btn => {
    btn.onclick = async () => {
      const id = btn.getAttribute("data-id");
      await updateDoc(doc(db, "reservas", id), { status: "cancelada" });
      location.reload();
    };
  });
}

function activarFiltros(){
  document.querySelectorAll("[data-filter]").forEach(btn=>{
    btn.onclick = ()=>{
      document.querySelectorAll("[data-filter]").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      filtro = btn.getAttribute("data-filter");
      render();
    };
  });
}

async function cargar(){
  const user = await new Promise(res=>{
    const unsub = onAuthStateChanged(auth,u=>{
      unsub();
      res(u);
    });
  });

  if(!user){
    alert("Iniciá sesión");
    location.href="login.html";
    return;
  }

  const snap = await getDocs(collection(db,"reservas"));

  snap.forEach(d=>{
    const r = d.data();

    if(r.huespedId === user.uid){
      reservas.push({
        ...r,
        id: d.id
      });
    }
  });

  document.getElementById("estadoCarga").style.display="none";
  render();
}

document.getElementById("logoutBtn").onclick = async ()=>{
  await signOut(auth);
  location.href="index.html";
};

activarFiltros();
cargar();
</script>

</body>
</html>
