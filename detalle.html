<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detalle - TuAloja</title>
  <link rel="stylesheet" href="style.css" />

  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:#f6f7fb;
      color:#1b1b1f;
    }

    .header{
      position:sticky;
      top:0;
      z-index:50;
      background:#fff;
      border-bottom:1px solid #eee;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      padding:20px 32px;
    }

    .logo{
      text-decoration:none;
      font-size:28px;
      font-weight:700;
      color:#2f2b8f;
      font-family: Georgia, "Times New Roman", serif;
    }

    .nav{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .nav a{
      text-decoration:none;
      color:#2f2b8f;
      border:1px solid #d9d9ea;
      padding:14px 22px;
      border-radius:16px;
      font-weight:600;
      background:#fff;
    }

    .hamburger{
      display:none;
      border:none;
      background:none;
      font-size:26px;
      cursor:pointer;
    }

    .detalle-page{
      max-width:1200px;
      margin:0 auto;
      padding:28px 20px 70px;
    }

    .detalle-back{
      display:inline-block;
      margin-bottom:18px;
      color:#4f3dbb;
      font-weight:700;
      text-decoration:none;
    }

    .detalle-layout h1{
      margin:0 0 12px;
      font-size:42px;
      font-family:Georgia, "Times New Roman", serif;
    }

    .detalle-top-meta{
      display:flex;
      flex-wrap:wrap;
      gap:12px 18px;
      margin-bottom:14px;
      color:#404457;
      font-size:16px;
    }

    .detalle-descripcion-top{
      margin:0 0 26px;
      max-width:900px;
      font-size:16px;
      line-height:1.6;
      color:#44495f;
    }

    .detalle-card{
      overflow:hidden;
      background:#fff;
      border:1px solid #e8e9f2;
      border-radius:26px;
      box-shadow:0 12px 34px rgba(27,31,53,.08);
    }

    .detalle-galeria{
      background:#eceef7;
      min-height:320px;
    }

    .detalle-galeria img{
      width:100%;
      height:100%;
      min-height:320px;
      max-height:460px;
      object-fit:cover;
      display:block;
    }

    .detalle-galeria-empty{
      min-height:320px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:30px;
      color:#5c6488;
      font-size:22px;
      font-weight:700;
      text-align:center;
      background:linear-gradient(135deg,#f4f5fb,#eceffd);
    }

    .detalle-info-grid{
      display:grid;
      grid-template-columns:1.25fr 380px;
    }

    .detalle-info-left{
      padding:34px 30px 38px;
      border-right:1px solid #ececf3;
      background:#fff;
    }

    .detalle-info-right{
      padding:28px 24px 28px;
      background:#fcfcff;
    }

    .detalle-bloque{margin-bottom:28px}
    .detalle-bloque h3{
      margin:0 0 14px;
      font-size:18px;
    }

    .detalle-lista{
      display:grid;
      gap:12px;
    }

    .detalle-item{
      font-size:16px;
      line-height:1.6;
      color:#41465a;
      padding-bottom:12px;
      border-bottom:1px solid #f0f1f6;
    }

    .chips{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      padding:10px 14px;
      border-radius:999px;
      background:#f3f4fb;
      color:#434a63;
      font-size:14px;
      font-weight:700;
      border:1px solid #e5e7f3;
    }

    .detalle-precio-card{
      position:sticky;
      top:18px;
      border:1px solid #e6e7f2;
      border-radius:22px;
      padding:22px 18px 18px;
      background:#fff;
      box-shadow:0 10px 24px rgba(74,61,183,.08);
    }

    .detalle-precio-numero{
      font-size:42px;
      font-weight:800;
      color:#171717;
    }

    .detalle-precio-texto{
      font-size:22px;
      color:#2a2a2a;
      margin-left:4px;
    }

    .detalle-subprecio{
      margin:0 0 18px;
      color:#615d88;
      font-size:15px;
      font-weight:700;
    }

    .detalle-reserva-form{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-bottom:12px;
    }

    .detalle-label{
      font-size:14px;
      font-weight:800;
      color:#26293a;
      margin-top:2px;
    }

    .detalle-input,
    .detalle-select{
      width:100%;
      height:52px;
      border:1px solid #d9dced;
      border-radius:14px;
      padding:0 14px;
      font-size:16px;
      background:#fff;
      outline:none;
      color:#20222d;
    }

    .detalle-alerta{
      margin:10px 0 8px;
      padding:13px 14px;
      border-radius:14px;
      font-size:14px;
      line-height:1.5;
      border:1px solid #d7d0ff;
      background:#f3f1ff;
      color:#4b3db7;
      font-weight:700;
    }

    .detalle-btn-reservar{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:100%;
      min-height:58px;
      padding:16px 20px;
      margin-top:4px;
      border:none;
      border-radius:16px;
      background:linear-gradient(180deg,#6f61ea,#4f3dbb);
      color:#fff;
      font-size:24px;
      font-weight:800;
      cursor:pointer;
    }

    .detalle-btn-reservar.disabled{
      background:#b9b7d9;
      cursor:not-allowed;
      pointer-events:none;
    }

    .muted{
      color:#666;
      font-size:18px;
    }

    @media(max-width:1050px){
      .detalle-info-grid{grid-template-columns:1fr}
      .detalle-info-left{
        border-right:none;
        border-bottom:1px solid #ececf3;
      }
      .detalle-precio-card{position:static}
    }

    @media(max-width:768px){
      .nav{display:none}
      .hamburger{display:block}
      .detalle-page{padding:20px 14px 50px}
      .detalle-layout h1{font-size:34px}
      .detalle-galeria img,
      .detalle-galeria-empty{min-height:240px}
      .detalle-info-left,
      .detalle-info-right{padding:22px 18px 24px}
      .detalle-precio-numero{font-size:34px}
      .detalle-btn-reservar{font-size:21px}
    }
  </style>
</head>

<body>
  <header class="header">
    <a class="logo" href="index.html">TuAloja.com</a>

    <nav id="mainNav" class="nav">
      <a href="publicar.html">Registra tu alojamiento</a>
      <a href="ayuda.html">Ayuda</a>
    </nav>

    <button id="hamburgerBtn" class="hamburger" type="button">☰</button>
  </header>

  <main class="detalle-page">
    <a id="volverResultados" class="detalle-back" href="resultados.html">← Volver a resultados</a>
    <div id="detalleAlojamiento"></div>
    <p id="noExiste" class="muted" style="display:none; margin-top:16px;">
      Este alojamiento no existe o fue eliminado.
    </p>
  </main>

  <script type="module">
    import { db } from "./firebase-config.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    const wrap = document.getElementById("detalleAlojamiento");
    const noExiste = document.getElementById("noExiste");
    const volverResultados = document.getElementById("volverResultados");

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");
    const checkinParam = params.get("checkin") || "";
    const checkoutParam = params.get("checkout") || "";
    const guestsParam = params.get("guests") || "1";
    const destinoParam = params.get("destino") || "";

    if (checkinParam || checkoutParam || guestsParam || destinoParam) {
      const backParams = new URLSearchParams();
      if (destinoParam) backParams.set("destino", destinoParam);
      if (checkinParam) backParams.set("checkin", checkinParam);
      if (checkoutParam) backParams.set("checkout", checkoutParam);
      if (guestsParam) backParams.set("guests", guestsParam);
      volverResultados.href = `resultados.html?${backParams.toString()}`;
    }

    function calcularNoches(checkin, checkout) {
      if (!checkin || !checkout) return 0;
      const entrada = new Date(checkin + "T00:00:00");
      const salida = new Date(checkout + "T00:00:00");
      const diff = salida.getTime() - entrada.getTime();
      if (isNaN(diff) || diff <= 0) return 0;
      return Math.round(diff / (1000 * 60 * 60 * 24));
    }

    function formatearPrecio(valor) {
      return Number(valor || 0).toLocaleString("es-AR");
    }

    function obtenerHoy() {
      const hoy = new Date();
      const y = hoy.getFullYear();
      const m = String(hoy.getMonth() + 1).padStart(2, "0");
      const d = String(hoy.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function limpiarTexto(texto, fallback = "") {
      if (texto === undefined || texto === null) return fallback;
      return String(texto).trim() || fallback;
    }

    function convertirLista(valor, fallback = []) {
      if (Array.isArray(valor)) return valor.filter(Boolean);
      if (typeof valor === "string" && valor.trim()) {
        return valor.split(",").map(x => x.trim()).filter(Boolean);
      }
      return fallback;
    }

    function getUserLocal() {
      try {
        const raw = localStorage.getItem("tualoja_user");
        return raw ? JSON.parse(raw) : null;
      } catch {
        return null;
      }
    }

    async function cargarDetalle() {
      try {
        if (!id) {
          noExiste.style.display = "block";
          return;
        }

        const ref = doc(db, "alojamientos", id);
        const snap = await getDoc(ref);

        if (!snap.exists()) {
          noExiste.style.display = "block";
          return;
        }

        const a = snap.data();

        const foto = a.fotos?.[0] || "";
        const precio = Number(a.precio || 0);
        const ciudad = limpiarTexto(a.ciudad, "Ubicación no informada");
        const provincia = limpiarTexto(a.provincia, "");
        const ubicacion = provincia ? `${ciudad} - ${provincia}` : ciudad;
        const descripcion = limpiarTexto(a.descripcion, "Sin descripción disponible.");
        const titulo = limpiarTexto(a.titulo, "Alojamiento sin título");
        const huespedes = Number(a.huespedes || 1);
        const tipo = limpiarTexto(a.tipo, "Departamento");
        const checkinHora = limpiarTexto(a.checkinHora, "14:00");
        const checkoutHora = limpiarTexto(a.checkoutHora, "10:00");
        const cancelacion = limpiarTexto(a.cancelacion, "No reembolsable");

        const servicios = convertirLista(a.servicios, ["Wifi", "Aire acondicionado"]);
        const reglas = convertirLista(a.reglas, ["No se permite fumar", "No se permiten fiestas"]);
        const hoy = obtenerHoy();

        wrap.innerHTML = `
          <section class="detalle-layout">
            <h1>${titulo}</h1>

            <div class="detalle-top-meta">
              <span><strong>Ubicación:</strong> ${ubicacion}</span>
              <span><strong>Capacidad:</strong> ${huespedes} huéspedes</span>
              <span><strong>Tipo:</strong> ${tipo}</span>
            </div>

            <p class="detalle-descripcion-top">${descripcion}</p>

            <div class="detalle-card">
              <div class="detalle-galeria">
                ${
                  foto
                    ? `<img src="${foto}" alt="${titulo}">`
                    : `<div class="detalle-galeria-empty">Sin imagen disponible</div>`
                }
              </div>

              <div class="detalle-info-grid">
                <div class="detalle-info-left">
                  <div class="detalle-bloque">
                    <h3>Información del alojamiento</h3>
                    <div class="detalle-lista">
                      <div class="detalle-item"><strong>Tipo:</strong> ${tipo}</div>
                      <div class="detalle-item"><strong>Capacidad:</strong> ${huespedes} huéspedes</div>
                      <div class="detalle-item"><strong>Check-in:</strong> ${checkinHora}</div>
                      <div class="detalle-item"><strong>Check-out:</strong> ${checkoutHora}</div>
                      <div class="detalle-item"><strong>Cancelación:</strong> ${cancelacion}</div>
                    </div>
                  </div>

                  <div class="detalle-bloque">
                    <h3>Servicios</h3>
                    <div class="chips">
                      ${servicios.map(item => `<span class="chip">${item}</span>`).join("")}
                    </div>
                  </div>

                  <div class="detalle-bloque">
                    <h3>Reglas</h3>
                    <div class="detalle-lista">
                      ${reglas.map(item => `<div class="detalle-item">${item}</div>`).join("")}
                    </div>
                  </div>
                </div>

                <div class="detalle-info-right">
                  <div class="detalle-precio-card">
                    <div>
                      <span class="detalle-precio-numero">$${formatearPrecio(precio)}</span>
                      <span class="detalle-precio-texto">/ noche</span>
                    </div>

                    <p class="detalle-subprecio">Precio final según cantidad de noches</p>

                    <div class="detalle-reserva-form">
                      <label class="detalle-label" for="checkin">Check-in</label>
                      <input class="detalle-input" type="date" id="checkin" value="${checkinParam}" min="${hoy}">

                      <label class="detalle-label" for="checkout">Check-out</label>
                      <input class="detalle-input" type="date" id="checkout" value="${checkoutParam}" min="${hoy}">

                      <label class="detalle-label" for="guests">Huéspedes</label>
                      <select class="detalle-select" id="guests">
                        ${Array.from({ length: huespedes }, (_, i) => i + 1).map(n => `
                          <option value="${n}" ${String(n) === String(guestsParam) ? "selected" : ""}>${n}</option>
                        `).join("")}
                      </select>
                    </div>

                    <div class="detalle-alerta" id="totalBox">
                      Seleccioná fechas válidas para calcular el total
                    </div>

                    <button class="detalle-btn-reservar disabled" id="btnReservar" type="button">
                      Reservar
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </section>
        `;

        const checkin = document.getElementById("checkin");
        const checkout = document.getElementById("checkout");
        const guests = document.getElementById("guests");
        const totalBox = document.getElementById("totalBox");
        const btnReservar = document.getElementById("btnReservar");

        function actualizarTotal() {
          if (checkin.value) {
            checkout.min = checkin.value;
          } else {
            checkout.min = hoy;
          }

          const noches = calcularNoches(checkin.value, checkout.value);

          if (noches <= 0) {
            totalBox.innerHTML = "Seleccioná fechas válidas para calcular el total";
            btnReservar.classList.add("disabled");
            return;
          }

          const total = noches * precio;
          totalBox.innerHTML = `<strong>${noches} ${noches === 1 ? "noche" : "noches"}</strong> · Total estimado: <strong>$${formatearPrecio(total)}</strong>`;
          btnReservar.classList.remove("disabled");
        }

        checkin.addEventListener("change", () => {
          if (checkout.value && checkout.value <= checkin.value) {
            checkout.value = "";
          }
          actualizarTotal();
        });

        checkout.addEventListener("change", actualizarTotal);

        const reservaGuardada = JSON.parse(localStorage.getItem("reservaPendiente") || "null");
        if (reservaGuardada && reservaGuardada.alojamientoId === id) {
          checkin.value = reservaGuardada.checkin || "";
          checkout.value = reservaGuardada.checkout || "";
          guests.value = String(reservaGuardada.guests || guests.value);
        }

        btnReservar.addEventListener("click", () => {
          const noches = calcularNoches(checkin.value, checkout.value);

          if (noches <= 0) {
            alert("Seleccioná fechas válidas.");
            return;
          }

          const cantidadHuespedes = Number(guests.value || 1);

          const reserva = {
            alojamientoId: id,
            checkin: checkin.value,
            checkout: checkout.value,
            guests: cantidadHuespedes
          };

          localStorage.setItem("reservaPendiente", JSON.stringify(reserva));

          const user = getUserLocal();

          if (!user) {
            localStorage.setItem("redirectAfterLogin", "reservar.html");
            alert("Tenés que iniciar sesión para reservar");
            window.location.href = "login.html";
            return;
          }

          window.location.href = "reservar.html";
        });

        actualizarTotal();
      } catch (error) {
        console.error("Error al cargar detalle:", error);
        noExiste.style.display = "block";
      }
    }

    cargarDetalle();
  </script>
</body>
</html>
