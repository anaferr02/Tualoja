<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reserva - TuAloja</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#f6f7fb;
    }

    .page{
      max-width:900px;
      margin:auto;
      padding:20px;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:20px;
      margin-bottom:20px;
    }

    input, textarea{
      width:100%;
      padding:12px;
      margin-top:8px;
      border-radius:10px;
      border:1px solid #ccc;
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:15px;
      margin-top:20px;
      background:#4f3dbb;
      color:white;
      border:none;
      border-radius:12px;
      font-weight:bold;
      cursor:pointer;
    }

    .estado{
      margin-top:10px;
      font-size:14px;
      color:#555;
    }
  </style>
</head>

<body>

<div class="page">

  <div class="card">
    <h2>Completar reserva</h2>

    <form id="formReserva">

      <label>Nombre</label>
      <input id="nombre" required>

      <label>Teléfono</label>
      <input id="telefono" required>

      <label>Mensaje</label>
      <textarea id="mensaje"></textarea>

      <button type="submit">
        Enviar solicitud de reserva
      </button>

      <div id="estado" class="estado"></div>
    </form>
  </div>

  <div class="card">
    <h3>Resumen</h3>
    <div id="resumen"></div>
  </div>

</div>

<script type="module">
import { db, auth } from "./firebase-config.js";
import {
  collection,
  addDoc,
  serverTimestamp,
  doc,
  getDoc,
  getDocs,
  query,
  where
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import {
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const form = document.getElementById("formReserva");
const resumen = document.getElementById("resumen");
const estado = document.getElementById("estado");

let reserva = JSON.parse(localStorage.getItem("reservaPendiente") || "null");
let usuarioActual = null;
let authResuelta = false;
let alojamientoActual = null;

function irALogin() {
  localStorage.setItem("redirectAfterLogin", "reservar.html");
  alert("Tenés que iniciar sesión para reservar");
  window.location.href = "login.html";
}

function calcularNoches(checkin, checkout) {
  if (!checkin || !checkout) return 0;
  const entrada = new Date(checkin + "T00:00:00");
  const salida = new Date(checkout + "T00:00:00");
  const diff = salida.getTime() - entrada.getTime();

  if (isNaN(diff) || diff <= 0) return 0;
  return Math.round(diff / (1000 * 60 * 60 * 24));
}

function obtenerHostId(a) {
  return (
    a?.anfitrionId ||
    a?.ownerUid ||
    a?.ownerId ||
    a?.hostUid ||
    a?.hostId ||
    a?.uid ||
    a?.userUid ||
    a?.userId ||
    a?.propietarioId ||
    ""
  );
}

function obtenerHostEmail(a) {
  return (
    a?.anfitrionEmail ||
    a?.ownerEmail ||
    a?.email ||
    a?.userEmail ||
    a?.hostEmail ||
    a?.correo ||
    ""
  );
}

onAuthStateChanged(auth, (user) => {
  authResuelta = true;

  if (!user) {
    usuarioActual = null;
    irALogin();
    return;
  }

  usuarioActual = user;
});

async function existeCruceDeFechas(alojamientoId, checkin, checkout) {
  const snap = await getDocs(
    query(collection(db, "reservas"), where("alojamientoId", "==", alojamientoId))
  );

  let ocupado = false;

  snap.forEach((d) => {
    const r = d.data();
    const estadoActual = String(r.status || "").toLowerCase();

    if (!["aceptada", "confirmada"].includes(estadoActual)) return;
    if (!r.checkin || !r.checkout) return;

    const inicioExistente = new Date(r.checkin + "T00:00:00").getTime();
    const finExistente = new Date(r.checkout + "T00:00:00").getTime();
    const inicioNueva = new Date(checkin + "T00:00:00").getTime();
    const finNueva = new Date(checkout + "T00:00:00").getTime();

    if (inicioNueva < finExistente && finNueva > inicioExistente) {
      ocupado = true;
    }
  });

  return ocupado;
}

async function cargarResumen() {
  if (!reserva || !reserva.alojamientoId) {
    resumen.innerHTML = "No hay reserva pendiente.";
    form.style.display = "none";
    return;
  }

  try {
    const ref = doc(db, "alojamientos", reserva.alojamientoId);
    const snap = await getDoc(ref);

    if (!snap.exists()) {
      resumen.innerHTML = "El alojamiento ya no existe.";
      form.style.display = "none";
      return;
    }

    alojamientoActual = snap.data();

    const precio = Number(alojamientoActual.precio || 0);
    const noches = calcularNoches(reserva.checkin, reserva.checkout);
    const total = noches > 0 ? precio * noches : 0;

    resumen.innerHTML = `
      <p><strong>${alojamientoActual.titulo || "Alojamiento"}</strong></p>
      <p>${reserva.checkin} → ${reserva.checkout}</p>
      <p>Huéspedes: ${reserva.guests}</p>
      <p>Noches: ${noches || "-"}</p>
      <p><strong>Total estimado:</strong> $${Number(total || 0).toLocaleString("es-AR")}</p>
    `;
  } catch (error) {
    console.error("Error al cargar resumen:", error);
    resumen.innerHTML = "Hubo un error al cargar el resumen.";
    form.style.display = "none";
  }
}

cargarResumen();

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  if (!authResuelta) {
    alert("Esperá un segundo e intentá de nuevo.");
    return;
  }

  if (!usuarioActual) {
    irALogin();
    return;
  }

  if (!reserva || !reserva.alojamientoId) {
    alert("No hay una reserva pendiente.");
    return;
  }

  if (!alojamientoActual) {
    alert("No se pudo cargar el alojamiento.");
    return;
  }

  const noches = calcularNoches(reserva.checkin, reserva.checkout);

  if (noches <= 0) {
    alert("Las fechas no son válidas.");
    return;
  }

  const estaOcupado = await existeCruceDeFechas(
    reserva.alojamientoId,
    reserva.checkin,
    reserva.checkout
  );

  if (estaOcupado) {
    alert("Esas fechas ya no están disponibles.");
    return;
  }

  const nombre = document.getElementById("nombre").value.trim();
  const telefono = document.getElementById("telefono").value.trim();
  const mensaje = document.getElementById("mensaje").value.trim();

  const precioNoche = Number(alojamientoActual.precio || 0);
  const total = precioNoche * noches;
  const anfitrionId = obtenerHostId(alojamientoActual);
  const anfitrionEmail = obtenerHostEmail(alojamientoActual);

  try {
    estado.textContent = "Enviando solicitud...";

    await addDoc(collection(db, "reservas"), {
      alojamientoId: reserva.alojamientoId,
      checkin: reserva.checkin,
      checkout: reserva.checkout,
      guests: Number(reserva.guests || 1),
      noches,
      precioNoche,
      total,

      huespedId: usuarioActual.uid,
      huespedEmail: usuarioActual.email || "",
      huespedNombre: nombre,
      guestName: nombre,
      guestEmail: usuarioActual.email || "",

      telefono,
      mensaje,

      anfitrionId,
      anfitrionEmail,
      hostId: anfitrionId,
      hostEmail: anfitrionEmail,
      ownerId: anfitrionId,
      ownerEmail: anfitrionEmail,

      titulo: alojamientoActual.titulo || "Alojamiento",
      title: alojamientoActual.titulo || "Alojamiento",
      foto: alojamientoActual.fotos?.[0] || "",
      alojamientoFoto: alojamientoActual.fotos?.[0] || "",
      alojamientoTitulo: alojamientoActual.titulo || "Alojamiento",

      status: "pendiente",
      chatHabilitado: false,
      chatIniciado: false,
      puedeCancelarHuesped: true,
      puedeCancelarAnfitrion: true,

      creadaEn: serverTimestamp()
    });

    localStorage.removeItem("reservaPendiente");
    localStorage.removeItem("redirectAfterLogin");

    alert("Solicitud enviada ✅");
    window.location.href = "mis-reservas.html";
  } catch (error) {
    console.error("Error al guardar reserva:", error);
    estado.textContent = "No se pudo enviar la solicitud.";
    alert("Hubo un error al enviar la solicitud.");
  }
});
</script>

</body>
</html>
