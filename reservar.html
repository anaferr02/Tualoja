<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reserva - TuAloja</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#f6f7fb;
    }

    .page{
      max-width:900px;
      margin:auto;
      padding:20px;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:20px;
      margin-bottom:20px;
    }

    input, textarea{
      width:100%;
      padding:12px;
      margin-top:8px;
      border-radius:10px;
      border:1px solid #ccc;
    }

    button{
      width:100%;
      padding:15px;
      margin-top:20px;
      background:#4f3dbb;
      color:white;
      border:none;
      border-radius:12px;
      font-weight:bold;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="page">

  <div class="card">
    <h2>Completar reserva</h2>

    <form id="formReserva">

      <label>Nombre</label>
      <input id="nombre" required>

      <label>Teléfono</label>
      <input id="telefono" required>

      <label>Mensaje</label>
      <textarea id="mensaje"></textarea>

      <button type="submit">
        Enviar solicitud de reserva
      </button>

    </form>
  </div>

  <div class="card">
    <h3>Resumen</h3>
    <div id="resumen"></div>
  </div>

</div>

<script type="module">
import { db } from "./firebase-config.js";
import {
  collection,
  addDoc,
  serverTimestamp,
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const form = document.getElementById("formReserva");
const resumen = document.getElementById("resumen");

let reserva = JSON.parse(localStorage.getItem("reservaPendiente"));

async function cargarResumen(){

  if(!reserva){
    resumen.innerHTML = "No hay reserva";
    return;
  }

  const ref = doc(db,"alojamientos",reserva.alojamientoId);
  const snap = await getDoc(ref);

  if(!snap.exists()){
    resumen.innerHTML = "No existe";
    return;
  }

  const a = snap.data();

  resumen.innerHTML = `
    <p>${a.titulo}</p>
    <p>${reserva.checkin} → ${reserva.checkout}</p>
    <p>Huéspedes: ${reserva.guests}</p>
  `;
}

cargarResumen();

form.addEventListener("submit", async(e)=>{
  e.preventDefault();

  const nombre = document.getElementById("nombre").value;
  const telefono = document.getElementById("telefono").value;
  const mensaje = document.getElementById("mensaje").value;

  await addDoc(collection(db,"reservas"),{
    alojamientoId: reserva.alojamientoId,
    checkin: reserva.checkin,
    checkout: reserva.checkout,
    guests: reserva.guests,

    huespedNombre: nombre,
    telefono,
    mensaje,

    status: "pendiente",
    creadaEn: serverTimestamp()
  });

  alert("Solicitud enviada ✅");
  localStorage.removeItem("reservaPendiente");
  window.location.href = "index.html";
});
</script>

</body>
</html>
