<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Recuperar contraseña</title>
</head>

<body>

<h2>Recuperar contraseña</h2>

<input id="email" placeholder="Tu email">
<button onclick="reset()">Enviar email</button>

<script type="module">

import { sendReset } from "./public/js/auth.js";

window.reset = async function(){

const email = document.getElementById("email").value;

await sendReset(email);

alert("Te enviamos un email para cambiar tu contraseña");

}

</script>

</body>
</html>
